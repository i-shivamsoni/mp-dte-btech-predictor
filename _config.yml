title: MP-DTE B.Tech College Predictor
description: >-
  Find which MP-DTE B.Tech colleges and branches you can get on your JEE rank or
  12th-class percentage, and see which branches and colleges are most in demand.
  Built from official 2017-2025 counselling cut-offs and the 2026-27 seat matrix.
baseurl: ""        # for a GitHub project page set to "/<repo-name>"
url: "https://mp-dte-btech-predictor.vercel.app"
lang: en

markdown: kramdown
permalink: pretty
sass:
  style: compressed

# Only the webapp ships; build inputs, scripts and docs are kept out of _site.
exclude:
  - DTE_CutOff_BTech/
  - DTE_Intake_BTech/
  - AFRC_Fees/
  - scripts/
  - __pycache__/
  - vendor/
  - .github/
  - .vercel/
  - Gemfile
  - Gemfile.lock
  - vercel.json
  - "*.pdf"
  - "*.py"
  - "*.sh"
  - "*.md"
  - fees.xml
  # local-only / PII source dirs — never publish (defense-in-depth; they're also gitignored,
  # so absent from the CI build, but this stops Jekyll copying them into _site if ever present locally)
  - MeritLists/
  - DTE_MeritList_BTech/
  - RTI/
  - stitch_mp_dte_college_predictor/

include:
  - assets

defaults:
  - scope: { path: "" }
    values: { layout: "default" }
